<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MRSH Cyber Platform</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:#0f172a;
    padding:20px;
}

.sidebar h2{
    color:#00ffcc;
}

.sidebar button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#1e293b;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* CARDS */
.card{
    background:#111827;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

/* NOTES */
textarea{
    width:100%;
    height:120px;
    background:#1f2937;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
}

/* AI BOX */
.chatBox{
    height:200px;
    overflow:auto;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

input{
    width:80%;
    padding:10px;
    border:none;
    border-radius:8px;
}

.chatBtn{
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MRSH 🔐</h2>

    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('tools')">Tools</button>
    <button onclick="showTab('notes')">Notes</button>
    <button onclick="showTab('ai')">AI Assistant</button>
    <button onclick="showTab('profile')">Profile</button>

    <hr>

    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <h1>Cyber Platform Dashboard</h1>
    <h3 id="user">Loading...</h3>

    <!-- HOME -->
    <div id="home" class="card">
        <h2>Welcome 🚀</h2>
        <p>MRSH Cyber Platform Ready</p>
    </div>

    <!-- TOOLS -->
    <div id="tools" class="card" style="display:none;">
        <h2>Tools Panel</h2>
        <button onclick="alert('Scanner UI Coming Soon 🔥')">Network Scanner</button>
        <button onclick="alert('Web Tool Coming Soon 🔥')">Web Scanner</button>
        <button onclick="alert('Password Tool Coming Soon 🔥')">Password Tools</button>
    </div>

    <!-- NOTES -->
    <div id="notes" class="card" style="display:none;">
        <h2>Notes</h2>
        <textarea id="noteBox" placeholder="Write your notes..."></textarea>
        <br><br>
        <button onclick="saveNotes()">Save Notes</button>
    </div>

    <!-- AI CHAT -->
    <div id="ai" class="card" style="display:none;">
        <h2>AI Assistant 🤖</h2>

        <div class="chatBox" id="chatBox"></div>

        <input id="msg" placeholder="Ask something...">
        <button class="chatBtn" onclick="sendMsg()">Send</button>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="card" style="display:none;">
        <h2>User Profile</h2>
        <p id="email"></p>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNHjHSYJWJ3WerBJv7tO-jDRb_QY49Dcs",
  authDomain: "mrsh-website.firebaseapp.com",
  projectId: "mrsh-website",
  storageBucket: "mrsh-website.firebasestorage.app",
  messagingSenderId: "206054036815",
  appId: "1:206054036815:web:97f0dbff66f977da6d213a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* USER */
auth.onAuthStateChanged((user)=>{
    if(user){
        document.getElementById("user").innerText = "Welcome " + user.email;
        document.getElementById("email").innerText = user.email;
    } else {
        window.location.href = "index.html";
    }
});

/* LOGOUT */
window.logout = async function(){
    await signOut(auth);
    window.location.href = "index.html";
};

/* TABS */
window.showTab = function(tab){
    ["home","tools","notes","ai","profile"].forEach(id=>{
        document.getElementById(id).style.display="none";
    });
    document.getElementById(tab).style.display="block";
};

/* NOTES */
window.saveNotes = function(){
    let text = document.getElementById("noteBox").value;
    localStorage.setItem("mrsh_notes", text);
    alert("Notes Saved ✔");
};

window.onload = function(){
    let saved = localStorage.getItem("mrsh_notes");
    if(saved){
        document.getElementById("noteBox").value = saved;
    }
};

/* AI CHAT (SIMPLE FAKE RESPONSE) */
window.sendMsg = function(){
    let msg = document.getElementById("msg").value;
    let box = document.getElementById("chatBox");

    box.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    let reply = "I'm MRSH AI 🤖 - I can guide you in cybersecurity basics.";

    box.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

    document.getElementById("msg").value="";
    box.scrollTop = box.scrollHeight;
};
</script>

</body>
</html>
