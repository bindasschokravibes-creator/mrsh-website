<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            background:black;
            color:#00ff00;
            font-family:monospace;
            text-align:center;
        }
        input {
            padding:10px;
        }
        button {
            padding:10px;
            margin:5px;
        }
    </style>
</head>
<body>

<h1>💀 Cyber Dashboard 💀</h1>

<h2>Ask AI</h2>
<input id="msg" placeholder="Type here...">
<button onclick="sendMsg()">Send</button>

<div id="chatBox"></div>

<script>
async function sendMsg(){
    let msg = document.getElementById("msg").value;
    let box = document.getElementById("chatBox");

    box.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    box.innerHTML += "<div><b>AI:</b> Coming soon...</div>";
}
</script>

</body>
</html>
