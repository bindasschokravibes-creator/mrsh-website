<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MRSH Cybersecurity Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="tools.html">Tools</a>
</nav>

<div class="container">

    <h1>Welcome to MRSH Cybersecurity Hub</h1>
    <p>Learn Ethical Hacking & Cybersecurity step by step</p>

    <button onclick="alert('Keep Learning 🔥')">Click Me</button>

    <div class="card">
        <h2>Topics</h2>
        <p>Networking | Web Hacking | Tools | Cybersecurity Basics</p>
    </div>

    <div class="card">
        <h2>About MRSH</h2>
        <p>This platform is created for learning ethical hacking in a simple way.</p>
    </div>

    <!-- AI BOX -->
    <div class="card">
        <h2>Ask AI 🤖</h2>

        <input type="text" id="userInput" placeholder="Type your question..."
        style="padding:10px; width:80%; border-radius:8px; border:none;">

        <br><br>

        <button onclick="askAI()">Ask</button>

        <p id="response" style="margin-top:15px; color:#38bdf8;"></p>
    </div>

</div>

<script>
async function askAI() {
    let input = document.getElementById("userInput").value;
    let responseBox = document.getElementById("response");

    if (!input) {
        responseBox.innerText = "Please type something...";
        return;
    }

    responseBox.innerText = "Thinking... 🤖";

    try {
        let res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_API_KEY_HERE"
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [{ role: "user", content: input }]
            })
        });

        let data = await res.json();

        responseBox.innerText = data.choices[0].message.content;

    } catch (error) {
        responseBox.innerText = "Error connecting AI 😢";
    }
}
</script>

</body>
</html>
