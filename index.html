<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MRSH Cybersecurity Arena</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body>

<h1>MRSH Cybersecurity Arena 🏆</h1>

<!-- LOGIN -->
<div id="authBox">

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<h2>Welcome 😎 <span id="user"></span></h2>

<p>Your Score: <span id="score">0</span></p>

<button onclick="loadChallenges()">Load Challenges</button>

<div id="challenges"></div>

<hr>

<h2>Leaderboard 🏆</h2>
<button onclick="loadLeaderboard()">Refresh</button>
<div id="board"></div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// SIGNUP
function signup(){
    auth.createUserWithEmailAndPassword(email.value,password.value);
}

// LOGIN
function login(){
    auth.signInWithEmailAndPassword(email.value,password.value)
    .then(u=>{
        currentUser = u.user;
        authBox.style.display="none";
        dashboard.style.display="block";
        user.innerText = currentUser.email;
        loadScore();
    });
}

// LOAD SCORE
function loadScore(){
    db.collection("users").doc(currentUser.uid).get()
    .then(doc=>{
        if(doc.exists){
            score.innerText = doc.data().score || 0;
        } else {
            db.collection("users").doc(currentUser.uid).set({
                email: currentUser.email,
                score: 0
            });
        }
    });
}

// LOAD CHALLENGES
function loadChallenges(){
    challenges.innerHTML = "Loading...";

    db.collection("challenges").get()
    .then(snapshot=>{
        challenges.innerHTML = "";

        snapshot.forEach(doc=>{
            let c = doc.data();

            challenges.innerHTML += `
            <div style="border:1px solid #fff; margin:10px; padding:10px;">
                <p>${c.question}</p>
                <input id="${doc.id}" placeholder="flag">
                <button onclick="submit('${doc.id}','${c.answer}',${c.points})">Submit</button>
            </div>`;
        });
    });
}

// SUBMIT ANSWER
function submit(id,answer,points){
    let input = document.getElementById(id).value;

    if(input == answer){
        alert("Correct ✔");

        db.collection("users").doc(currentUser.uid).update({
            score: firebase.firestore.FieldValue.increment(points)
        });

        loadScore();
    } else {
        alert("Wrong ❌");
    }
}

// LEADERBOARD
function loadLeaderboard(){
    board.innerHTML = "Loading...";

    db.collection("users")
    .orderBy("score","desc")
    .get()
    .then(snapshot=>{
        board.innerHTML = "";

        snapshot.forEach(doc=>{
            board.innerHTML += `
            <p>${doc.data().email} - ${doc.data().score}</p>`;
        });
    });
}

</script>

</body>
</html>
