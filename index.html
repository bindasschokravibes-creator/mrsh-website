<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MRSH Cybersecurity Hub</title>
</head>

<body style="text-align:center; font-family:Arial; background:#0b1220; color:white;">

<h1>MRSH Cybersecurity Arena 🏆</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- FIREBASE MODERN SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
    try {
        await createUserWithEmailAndPassword(auth, email.value, password.value);
        msg.innerText = "Account Created 🔥";
    } catch(err){
        msg.innerText = err.message;
    }
}

// LOGIN
window.login = async function(){
    try {
        const user = await signInWithEmailAndPassword(auth, email.value, password.value);
        msg.innerText = "Login Success ✔ " + user.user.email;
    } catch(err){
        msg.innerText = err.message;
    }
}
</script>

</body>
</html>
