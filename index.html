<!-- AI CHAT BOX -->
<div class="card">
    <h2>AI Chat 🤖</h2>

    <div id="chatBox" style="
        background:#0b1220;
        padding:15px;
        height:300px;
        overflow-y:auto;
        border-radius:10px;
        text-align:left;
        border:1px solid #38bdf8;
    "></div>

    <br>

    <input id="userInput" placeholder="Type your message..."
    style="padding:10px; width:70%; border-radius:8px; border:none;">

    <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    if (!input.value) return;

    // User message
    chatBox.innerHTML += "<p><b>You:</b> " + input.value + "</p>";

    let userText = input.value;
    input.value = "";

    // AI typing
    chatBox.innerHTML += "<p><b>AI:</b> thinking...</p>";

    try {
        let res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_API_KEY_HERE"
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [{ role: "user", content: userText }]
            })
        });

        let data = await res.json();

        let aiText = data.choices[0].message.content;

        chatBox.innerHTML += "<p><b>AI:</b> " + aiText + "</p>";

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (err) {
        chatBox.innerHTML += "<p><b>AI:</b> Error connecting AI 😢</p>";
    }
}
</script>
