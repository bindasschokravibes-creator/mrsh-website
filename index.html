<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MRSH Cybersecurity Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="tools.html">Tools</a>
</nav>

<div class="container">

    <h1>Welcome to MRSH Cybersecurity Hub</h1>
    <p>Learn Ethical Hacking & Cybersecurity step by step</p>

    <button onclick="alert('Keep Learning 🔥')">Click Me</button>

    <hr>

    <h2>Login / Signup</h2>

    <input id="email" type="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCNHjHSYJWJ3WerBJv7tO-jDRb_QY49Dcs",
  authDomain: "mrsh-website.firebaseapp.com",
  projectId: "mrsh-website",
  storageBucket: "mrsh-website.firebasestorage.app",
  messagingSenderId: "206054036815",
  appId: "1:206054036815:web:97f0dbff66f977da6d213a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGNUP
window.signup = function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        document.getElementById("msg").innerText = "Account Created 🔥";
    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });
}

// LOGIN + REDIRECT
window.login = function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
        document.getElementById("msg").innerText =
        "Login Success ✔ " + userCredential.user.email;

        // 🔥 REDIRECT TO DASHBOARD
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });
}
</script>

</body>
</html>
